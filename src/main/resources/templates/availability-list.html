<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Availability Management</title>
</head>
<body>
    <h1>Availability Slots</h1>
    <a href="#">+ Add New Slot</a>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Specialist ID</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="slot : ${slots}">
                <td th:text="${slot.id}"></td>
                <td th:text="${slot.specialistId}"></td>
                <td th:text="${slot.startTime}"></td>
                <td th:text="${slot.endTime}"></td>
                <td th:text="${slot.status}"></td>
                <td><a href="#">Edit</a> | <a href="#">Delete</a></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
